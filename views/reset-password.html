<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Changer le mot de passe — Portail Serveur</title>

    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="login-body">

    <!-- Fond animé (identique au login) -->
    <div class="bg-anim">
        <div class="bg-grid"></div>
        <div class="bg-orb bg-orb-1"></div>
        <div class="bg-orb bg-orb-2"></div>
        <div class="bg-orb bg-orb-3"></div>
        <canvas id="particles"></canvas>
    </div>

    <div class="login-wrapper">

        <!-- Avatar avec anneau lumineux -->
        <div class="avatar-ring">
            <div class="avatar">
                <i class="fa-solid fa-shield-halved"></i>
            </div>
        </div>

        <div class="login-card">

            <h2 class="login-title">Changer le mot de passe</h2>
            <p class="login-subtitle">Vérifiez votre identité puis choisissez un nouveau mot de passe</p>

            <!-- Message de succès (affiché si ?reset=success) -->
            <div id="success-msg" class="msg-success" style="display:none">
                <i class="fa-solid fa-circle-check"></i>
                <span>Mot de passe modifié avec succès !</span>
            </div>

            <form method="POST" action="/reset-password" id="reset-form">

                <div class="input-group">
                    <div class="icon">
                        <i class="fa-solid fa-user"></i>
                    </div>
                    <input
                        type="text"
                        name="username"
                        placeholder="Identifiant"
                        required
                        autocomplete="username">
                </div>

                <div class="input-group">
                    <div class="icon">
                        <i class="fa-solid fa-lock"></i>
                    </div>
                    <input
                        type="password"
                        name="current_password"
                        id="current_password"
                        placeholder="Mot de passe actuel"
                        required
                        autocomplete="current-password">
                    <button type="button" class="toggle-pwd" data-target="current_password" aria-label="Afficher le mot de passe">
                        <i class="fa-regular fa-eye"></i>
                        <i class="fa-regular fa-eye-slash" style="display:none"></i>
                    </button>
                </div>

                <div class="input-group">
                    <div class="icon">
                        <i class="fa-solid fa-key"></i>
                    </div>
                    <input
                        type="password"
                        name="new_password"
                        id="new_password"
                        placeholder="Nouveau mot de passe"
                        required
                        minlength="6"
                        autocomplete="new-password">
                    <button type="button" class="toggle-pwd" data-target="new_password" aria-label="Afficher le mot de passe">
                        <i class="fa-regular fa-eye"></i>
                        <i class="fa-regular fa-eye-slash" style="display:none"></i>
                    </button>
                </div>

                <div class="input-group">
                    <div class="icon">
                        <i class="fa-solid fa-check-double"></i>
                    </div>
                    <input
                        type="password"
                        name="confirm_password"
                        id="confirm_password"
                        placeholder="Confirmer le mot de passe"
                        required
                        minlength="6"
                        autocomplete="new-password">
                    <button type="button" class="toggle-pwd" data-target="confirm_password" aria-label="Afficher le mot de passe">
                        <i class="fa-regular fa-eye"></i>
                        <i class="fa-regular fa-eye-slash" style="display:none"></i>
                    </button>
                </div>

                <!-- Indicateur de correspondance -->
                <div id="match-indicator" class="match-indicator" style="display:none">
                    <i class="fa-solid fa-circle-info"></i>
                    <span></span>
                </div>

                <button type="submit" class="login-btn">
                    <span>VALIDER</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </button>

            </form>

            <div class="reset-back">
                <a href="/">
                    <i class="fa-solid fa-arrow-left"></i>
                    Retour à la connexion
                </a>
            </div>

        </div>

        <div class="server-info">
            <i class="fa-solid fa-shield-halved"></i>
            Ubuntu 26.04 · Node.js + Nginx · UFW + Tailscale
        </div>

    </div>

    <script src="/widgets.js"></script>
    <script>
        // ── Afficher le message de succès si ?reset=success ──
        (function() {
            const params = new URLSearchParams(window.location.search);
            if (params.get('reset') === 'success') {
                const msg = document.getElementById('success-msg');
                if (msg) msg.style.display = 'flex';
            }
        })();

        // ── Toggle password visibility (plusieurs champs) ──
        document.querySelectorAll('.toggle-pwd').forEach(function(btn) {
            btn.addEventListener('click', function() {
                var targetId = this.getAttribute('data-target');
                var inp = document.getElementById(targetId);
                if (!inp) return;
                var eyeOpen = this.querySelector('.fa-eye');
                var eyeClosed = this.querySelector('.fa-eye-slash');
                if (inp.type === 'password') {
                    inp.type = 'text';
                    eyeOpen.style.display = 'none';
                    eyeClosed.style.display = 'inline';
                } else {
                    inp.type = 'password';
                    eyeOpen.style.display = 'inline';
                    eyeClosed.style.display = 'none';
                }
            });
        });

        // ── Indicateur de correspondance des mots de passe ──
        (function() {
            var pwd1 = document.getElementById('new_password');
            var pwd2 = document.getElementById('confirm_password');
            var indicator = document.getElementById('match-indicator');
            if (!pwd1 || !pwd2 || !indicator) return;

            function check() {
                var v1 = pwd1.value;
                var v2 = pwd2.value;
                if (!v1 && !v2) {
                    indicator.style.display = 'none';
                    return;
                }
                indicator.style.display = 'flex';
                var icon = indicator.querySelector('i');
                var span = indicator.querySelector('span');
                if (v1 === v2) {
                    indicator.className = 'match-indicator match-ok';
                    icon.className = 'fa-solid fa-circle-check';
                    span.textContent = 'Les mots de passe correspondent';
                } else {
                    indicator.className = 'match-indicator match-ko';
                    icon.className = 'fa-solid fa-circle-xmark';
                    span.textContent = 'Les mots de passe ne correspondent pas';
                }
            }

            pwd1.addEventListener('input', check);
            pwd2.addEventListener('input', check);
        })();

        // ── Particles animées (identique au login) ──
        (function() {
            const canvas = document.getElementById('particles');
            const ctx = canvas.getContext('2d');
            let w, h, particles = [];

            function resize() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            class Particle {
                constructor() { this.reset(); }
                reset() {
                    this.x = Math.random() * w;
                    this.y = Math.random() * h;
                    this.r = Math.random() * 2 + 0.5;
                    this.dx = (Math.random() - 0.5) * 0.3;
                    this.dy = (Math.random() - 0.5) * 0.3;
                    this.opacity = Math.random() * 0.4 + 0.1;
                }
                update() {
                    this.x += this.dx;
                    this.y += this.dy;
                    if (this.x < 0 || this.x > w) this.dx *= -1;
                    if (this.y < 0 || this.y > h) this.dy *= -1;
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255,255,255,${this.opacity})`;
                    ctx.fill();
                }
            }

            for (let i = 0; i < 40; i++) particles.push(new Particle());

            function animate() {
                ctx.clearRect(0, 0, w, h);
                particles.forEach(p => { p.update(); p.draw(); });
                requestAnimationFrame(animate);
            }
            animate();
        })();
    </script>

</body>
</html>
